name: scrape-hourly

on:
  # Estrategia multi-trigger para sobrevivir a la baja confiabilidad del cron
  # de GitHub Actions:
  #   1) schedule cada 10 min entre 10:00-22:50 UTC (≈7-19 ART, ~78 intentos/día)
  #   2) push a main: cualquier commit dispara un run (insurance manual)
  #   3) workflow_dispatch: trigger desde la UI (con override 'force')
  #   4) repository_dispatch: trigger via API externa (cron-job.org si se configura)
  # El step "Skip si run reciente" abajo cancela el resto del job sin gastar
  # proxy si la rama `data` se actualizó hace <60 min, así que la cuota de
  # ScraperAPI sigue siendo ~10 runs reales/día sin importar cuántos triggers
  # entren.
  schedule:
    - cron: "*/10 10-22 * * *"
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'viewer/**'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forzar run aunque haya habido uno reciente'
        type: boolean
        default: true
  repository_dispatch:
    types: [scrape]

permissions:
  contents: write           # para commitear el estado a la rama "data"
  pages: write              # para deployar Pages
  id-token: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      skip: ${{ steps.should_run.outputs.skip }}

    steps:
      - name: Checkout código (main)
        uses: actions/checkout@v4
        with:
          path: code

      - name: Checkout estado previo (rama "data", si existe)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: data
          path: state

      - name: Skip si hubo un run reciente
        # Solo skippeamos en triggers schedule y push: queremos evitar runs
        # redundantes (proxy quota). En workflow_dispatch (manual) y
        # repository_dispatch (externo) NO skippeamos: el caller quiere correr.
        # workflow_dispatch.inputs.force=false permite skippear igual si querés.
        id: should_run
        if: ${{ github.event_name == 'schedule' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.force == false) }}
        run: |
          set -e
          if [ -d state ]; then
            cd state
            LAST=$(git log -1 --format=%ct 2>/dev/null || echo 0)
            NOW=$(date +%s)
            DELTA=$(( NOW - LAST ))
            MINS=$(( DELTA / 60 ))
            echo "Último commit en data: hace $MINS min (delta=$DELTA s)"
            if [ "$DELTA" -lt 3600 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Skipping — último run fue hace $MINS min (<60)"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No hay rama data todavía → corremos"
          fi
        shell: bash

      - name: Restaurar DB y reportes previos al working tree
        if: ${{ steps.should_run.outputs.skip != 'true' }}
        run: |
          set -e
          if [ -d state ]; then
            mkdir -p code/data code/reports
            # Sólo restauramos la DB y reportes. El index.html del viewer siempre
            # viene de main (fresco) — sólo lo enriquecemos con datos en el step siguiente.
            cp -r state/data/.    code/data/    2>/dev/null || true
            cp -r state/reports/. code/reports/ 2>/dev/null || true
          fi
        shell: bash

      - name: Set up Python
        if: ${{ steps.should_run.outputs.skip != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        if: ${{ steps.should_run.outputs.skip != 'true' }}
        working-directory: code
        run: pip install -r requirements.txt

      - name: Run scraper
        if: ${{ steps.should_run.outputs.skip != 'true' }}
        working-directory: code
        env:
          TZ: America/Argentina/Buenos_Aires
          # Si el secret está configurado, los scrapers rutean por ScraperAPI con IP residencial AR.
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        # Cuota del proxy: 3 págs × (3+4 amb) × 2 fuentes × 9 corridas reales/día ≈ 162 reqs/día
        # → ~4.860/mes (97% del free tier de 5K). Los slots que skippean no llegan acá.
        run: python run_daily.py --max-pages 3

      - name: Persistir estado a la rama "data"
        if: ${{ steps.should_run.outputs.skip != 'true' }}
        run: |
          set -e
          # Preparamos un repo limpio en /tmp/data con sólo los artefactos.
          rm -rf /tmp/data && mkdir /tmp/data
          cp -r code/data    /tmp/data/data
          cp -r code/viewer  /tmp/data/viewer
          cp -r code/reports /tmp/data/reports 2>/dev/null || true
          cp -r code/logs    /tmp/data/logs    2>/dev/null || true
          cd /tmp/data
          git init -q -b data
          git config user.name  "scraprop-bot"
          git config user.email "scraprop-bot@users.noreply.github.com"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add .
          git commit -q -m "scrape $(date -u +%Y-%m-%dT%H:%M:%SZ)" || { echo "nothing to commit"; exit 0; }
          git push -q origin data --force
        shell: bash

      - name: Empaquetar viewer para Pages
        if: ${{ steps.should_run.outputs.skip != 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: code/viewer

  deploy-pages:
    needs: scrape
    # Si scrape skippeó (no hay artifact nuevo), no intentamos deployar Pages.
    if: ${{ needs.scrape.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
