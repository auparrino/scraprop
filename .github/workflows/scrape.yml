name: scrape-hourly

on:
  # Estrategia: agendar cada 15 min entre 10:00-22:45 UTC (≈7-19 ART) y dejar
  # que el primer step decida si hay que scrapear o salir. Como GitHub Actions
  # droppea cron-triggers de manera errática (más en slots saturados), tener
  # ~52 intentos/día garantiza que igual entren ~9 corridas reales aunque la
  # mitad se caigan. El guard "Skip si run reciente" abajo cancela el resto del
  # job sin gastar proxy si la rama `data` se actualizó hace <80 min, así que
  # la cuota de ScraperAPI queda igual a 9 runs/día.
  schedule:
    - cron: "*/15 10-22 * * *"
  workflow_dispatch: {}     # permite disparar manualmente desde la UI

permissions:
  contents: write           # para commitear el estado a la rama "data"
  pages: write              # para deployar Pages
  id-token: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      skip: ${{ steps.should_run.outputs.skip }}

    steps:
      - name: Checkout código (main)
        uses: actions/checkout@v4
        with:
          path: code

      - name: Checkout estado previo (rama "data", si existe)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: data
          path: state

      - name: Skip si hubo un run reciente
        # En triggers schedule, salimos temprano si el último commit de la rama
        # `data` es de hace <80 min — ya hubo una corrida en este slot lógico.
        # Para workflow_dispatch (manual) y repository_dispatch (externo) NO
        # skippeamos: el usuario quiere correr ya.
        id: should_run
        if: ${{ github.event_name == 'schedule' }}
        run: |
          set -e
          if [ -d state ]; then
            cd state
            LAST=$(git log -1 --format=%ct 2>/dev/null || echo 0)
            NOW=$(date +%s)
            DELTA=$(( NOW - LAST ))
            MINS=$(( DELTA / 60 ))
            echo "Último commit en data: hace $MINS min (delta=$DELTA s)"
            if [ "$DELTA" -lt 4800 ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Skipping — último run fue hace $MINS min (<80)"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No hay rama data todavía → corremos"
          fi
        shell: bash

      - name: Restaurar DB y reportes previos al working tree
        if: ${{ steps.should_run.outputs.skip != 'true' }}
        run: |
          set -e
          if [ -d state ]; then
            mkdir -p code/data code/reports
            # Sólo restauramos la DB y reportes. El index.html del viewer siempre
            # viene de main (fresco) — sólo lo enriquecemos con datos en el step siguiente.
            cp -r state/data/.    code/data/    2>/dev/null || true
            cp -r state/reports/. code/reports/ 2>/dev/null || true
          fi
        shell: bash

      - name: Set up Python
        if: ${{ steps.should_run.outputs.skip != 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install deps
        if: ${{ steps.should_run.outputs.skip != 'true' }}
        working-directory: code
        run: pip install -r requirements.txt

      - name: Run scraper
        if: ${{ steps.should_run.outputs.skip != 'true' }}
        working-directory: code
        env:
          TZ: America/Argentina/Buenos_Aires
          # Si el secret está configurado, los scrapers rutean por ScraperAPI con IP residencial AR.
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
        # Cuota del proxy: 3 págs × (3+4 amb) × 2 fuentes × 9 corridas reales/día ≈ 162 reqs/día
        # → ~4.860/mes (97% del free tier de 5K). Los slots que skippean no llegan acá.
        run: python run_daily.py --max-pages 3

      - name: Persistir estado a la rama "data"
        if: ${{ steps.should_run.outputs.skip != 'true' }}
        run: |
          set -e
          # Preparamos un repo limpio en /tmp/data con sólo los artefactos.
          rm -rf /tmp/data && mkdir /tmp/data
          cp -r code/data    /tmp/data/data
          cp -r code/viewer  /tmp/data/viewer
          cp -r code/reports /tmp/data/reports 2>/dev/null || true
          cp -r code/logs    /tmp/data/logs    2>/dev/null || true
          cd /tmp/data
          git init -q -b data
          git config user.name  "scraprop-bot"
          git config user.email "scraprop-bot@users.noreply.github.com"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git add .
          git commit -q -m "scrape $(date -u +%Y-%m-%dT%H:%M:%SZ)" || { echo "nothing to commit"; exit 0; }
          git push -q origin data --force
        shell: bash

      - name: Empaquetar viewer para Pages
        if: ${{ steps.should_run.outputs.skip != 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: code/viewer

  deploy-pages:
    needs: scrape
    # Si scrape skippeó (no hay artifact nuevo), no intentamos deployar Pages.
    if: ${{ needs.scrape.outputs.skip != 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
